name: Publish

on:
  push:
    tags:
      - v*
jobs:
  publish:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Tag
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.push.ref }}
    - name: Use Node.js 20.*
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install NPM Packages
      run: |
        npm -v
        npm ci
        npm install -g vsce ovsx semver
    - name: Detect pre-release
      id: prerelease
      run: |
        if [ "$(jq -r '.preview // false' package.json)" = "true" ]; then
          echo "flag=--pre-release" >> $GITHUB_OUTPUT
          echo "::notice::Pre-release channel detected (preview: true)"
        else
          echo "flag=" >> $GITHUB_OUTPUT
          echo "::notice::Stable release channel"
        fi
    - name: Create Package
      run: vsce package ${{ steps.prerelease.outputs.flag }}
    - name: Publish Package
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        file=$(realpath $(ls -t *.vsix | head -1))
        vsce publish -i $file ${{ steps.prerelease.outputs.flag }} -p ${{ secrets.VSCE_TOKEN }}
        npx ovsx publish $file -p ${{ secrets.OVSX_TOKEN }}
        VERSION=$(echo '${{ github.ref_name }}' | sed 's/^v//')
        # Extract changelog notes: first try the exact version section, then fall back to [Unreleased]
        awk -v ver="$VERSION" '
          $0 ~ "^## \\[" ver "\\]" {found=1; next}
          found && /^## \[/ {exit}
          found {print}
        ' CHANGELOG.md | sed '/./,$!d' | tac | sed '/./,$!d' | tac > /tmp/release-body.md
        if [ ! -s /tmp/release-body.md ]; then
          echo "Version section [${VERSION}] not found, extracting from [Unreleased]..."
          awk '
            /^## \[Unreleased\]/ {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md | sed '/./,$!d' | tac | sed '/./,$!d' | tac > /tmp/release-body.md
        fi
        if [ ! -s /tmp/release-body.md ]; then
          echo "See [Changelog](https://github.com/Serhioromano/vscode-gitflow/blob/master/CHANGELOG.md) for details." > /tmp/release-body.md
        fi
        gh release create '${{ github.ref_name }}' ${{ steps.prerelease.outputs.flag }} --notes-file /tmp/release-body.md $file
